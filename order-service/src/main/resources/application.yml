spring:
  application:
    name: order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/saga_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

saga:
  clients:
    payment-service-url: ${PAYMENT_SERVICE_URL:http://localhost:8081}
    inventory-service-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
    connect-timeout-ms: ${DOWNSTREAM_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${DOWNSTREAM_READ_TIMEOUT_MS:5000}
