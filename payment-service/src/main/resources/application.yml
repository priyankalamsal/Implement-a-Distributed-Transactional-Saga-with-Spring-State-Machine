spring:
  application:
    name: payment-service

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

payment:
  failing-order-id: ${FAILING_PAYMENT_ORDER_ID:201}
  processing-delay-ms: ${PAYMENT_DELAY_MS:0}
