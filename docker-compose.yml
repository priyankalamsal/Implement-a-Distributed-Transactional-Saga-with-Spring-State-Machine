services:
  db:
    image: postgres:14-alpine
    container_name: saga-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    environment:
      SERVER_PORT: 8081
      FAILING_PAYMENT_ORDER_ID: ${FAILING_PAYMENT_ORDER_ID:-201}
      PAYMENT_DELAY_MS: ${PAYMENT_DELAY_MS:-0}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    environment:
      SERVER_PORT: 8082
      FAILING_INVENTORY_ORDER_ID: ${FAILING_INVENTORY_ORDER_ID:-302}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8081}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service:8082}
      DOWNSTREAM_CONNECT_TIMEOUT_MS: ${DOWNSTREAM_CONNECT_TIMEOUT_MS:-2000}
      DOWNSTREAM_READ_TIMEOUT_MS: ${DOWNSTREAM_READ_TIMEOUT_MS:-5000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
